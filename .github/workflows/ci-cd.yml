name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Deploy to production?'
        required: true
        type: boolean
        default: false

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build PHP deps ──────────────────────────────────
  build-composer:
    name: 📦 Composer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pgsql, redis
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-ansi --no-interaction --no-progress --optimize-autoloader

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: composer-vendor
          path: vendor/
          retention-days: 1

  # ── 2. Build frontend ──────────────────────────────────
  build-assets:
    name: 🎨 Frontend Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-assets
          path: public/build/
          retention-days: 1

  # ── 3. Tests ────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [build-composer, build-assets]

    services:
      pgsql:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: acomody
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: --health-cmd="pg_isready -U acomody" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pgsql, redis
          coverage: none

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: composer-vendor
          path: vendor/

      - name: Download assets artifact
        uses: actions/download-artifact@v4
        with:
          name: built-assets
          path: public/build/

      - name: Prepare test environment
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
        env:
          APP_KEY: ""
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: acomody
          DB_PASSWORD: secret
          CACHE_STORE: redis
          REDIS_HOST: 127.0.0.1
          SCOUT_DRIVER: "null"
          FILESYSTEM_DISK: local
          QUEUE_CONNECTION: sync

      - name: Write .env.testing overrides
        run: |
          cat >> .env.testing <<EOF
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=testing
          DB_USERNAME=acomody
          DB_PASSWORD=secret
          CACHE_STORE=redis
          REDIS_HOST=127.0.0.1
          SCOUT_DRIVER=null
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          EOF

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test --parallel

  # ── 4. Static analysis ─────────────────────────────────
  phpstan:
    name: 🔍 PHPStan
    runs-on: ubuntu-latest
    needs: [build-composer]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pgsql, redis
          coverage: none

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: composer-vendor
          path: vendor/

      - name: Fix permissions
        run: chmod +x ./vendor/bin/phpstan

      - name: Run PHPStan
        run: composer analyse

  # ── 5. Build & push Docker image ──────────────────────
  build-image:
    name: 🐳 Docker Image
    runs-on: ubuntu-latest
    needs: [test, phpstan]
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. Deploy to staging ────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build-image]
    environment: staging
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose file to server
        run: |
          scp docker-compose.staging.yml ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:${{ secrets.STAGING_DEPLOY_PATH }}/docker-compose.staging.yml

      - name: Deploy to staging
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          ssh $SSH_USER@$SSH_HOST "
            set -e
            cd $DEPLOY_PATH

            # Pull the new image
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.staging.yml pull app horizon

            # Restart services with zero-downtime (new containers start before old stop)
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.staging.yml up -d --remove-orphans

            # Run migrations
            docker compose -f docker-compose.staging.yml exec -T app php artisan migrate --force

            # Restart Horizon gracefully
            docker compose -f docker-compose.staging.yml exec -T horizon php artisan horizon:terminate || true

            # Cleanup old images
            docker image prune -f
          "

  # ── 7. Deploy to production ────────────────────────────
  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    needs: [build-image]
    environment: production
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose file to server
        run: |
          scp docker-compose.prod.yml ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/docker-compose.prod.yml

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh $SSH_USER@$SSH_HOST "
            set -e
            cd $DEPLOY_PATH

            # Pull the new image
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml pull app horizon

            # Restart services
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force

            # Restart Horizon gracefully
            docker compose -f docker-compose.prod.yml exec -T horizon php artisan horizon:terminate || true

            # Cleanup old images
            docker image prune -f
          "
