  #       with:
  #         php-version: ${{ env.PHP_VERSION }}
  #         coverage: none

  #     - name: Download vendor artifact
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: composer-vendor
  #         path: vendor/

  #     - name: Download assets artifact
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: built-assets
  #         path: public/build/

  #     - name: Setup SSH agent
  #       uses: webfactory/ssh-agent@v0.9.0
  #       with:
  #         ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

  #     - name: Add server to known_hosts
  #       run: ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

  #     - name: Deploy to staging
  #       run: chmod +x vendor/bin/dep && vendor/bin/dep deploy staging -vvv
  #       env:
  #         APP_NAME: ${{ vars.APP_NAME }}
  #         GIT_REPO: ${{ vars.GIT_REPO }}
  #         SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
  #         SSH_USER: ${{ secrets.STAGING_SSH_USER }}
  #         DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}

  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    needs: [test, phpstan, build-assets]
    environment: production
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: composer-vendor
          path: vendor/

      - name: Download assets artifact
        uses: actions/download-artifact@v4
        with:
          name: built-assets
          path: public/build/

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to production
        run: chmod +x vendor/bin/dep && vendor/bin/dep deploy:production production -vvv
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          GIT_REPO: ${{ vars.GIT_REPO }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}