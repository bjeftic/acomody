name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Deploy to production?'
        required: true
        type: boolean
        default: false

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  build-composer:
    name: 📦 Composer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pgsql, redis
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-ansi --no-interaction --no-progress --optimize-autoloader

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: composer-vendor
          path: vendor/
          retention-days: 1

  build-assets:
    name: 🎨 Frontend Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-assets
          path: public/build/
          retention-days: 1

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [build-composer, build-assets]

    services:
      pgsql:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: acomody
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: --health-cmd="pg_isready -U acomody" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pgsql, redis
          coverage: none

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: composer-vendor
          path: vendor/

      - name: Download assets artifact
        uses: actions/download-artifact@v4
        with:
          name: built-assets
          path: public/build/

      - name: Prepare test environment
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
        env:
          APP_KEY: ""
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: acomody
          DB_PASSWORD: secret
          CACHE_STORE: redis
          REDIS_HOST: 127.0.0.1
          SCOUT_DRIVER: "null"
          FILESYSTEM_DISK: local
          QUEUE_CONNECTION: sync

      - name: Write .env.testing overrides
        run: |
          cat >> .env.testing <<EOF
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=testing
          DB_USERNAME=acomody
          DB_PASSWORD=secret
          CACHE_STORE=redis
          REDIS_HOST=127.0.0.1
          SCOUT_DRIVER=null
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          EOF

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test --parallel

  phpstan:
    name: 🔍 PHPStan
    runs-on: ubuntu-latest
    needs: [build-composer]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, zip, gd, bcmath, intl, pgsql, redis
          coverage: none

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: composer-vendor
          path: vendor/

      - name: Fix permissions
        run: chmod +x ./vendor/bin/phpstan

      - name: Run PHPStan
        run: composer analyse

  # deploy-staging:
  #   name: 🚀 Deploy → Staging
  #   runs-on: ubuntu-latest
  #   needs: [test, phpstan, build-assets]
  #   environment: staging

  #   steps:
